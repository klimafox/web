<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlímaFox.hu - Légkondicionáló Telepítés, Javítás, Karbantartás Budapest és Pest Megye</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'orange': { 50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74', 400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c', 800: '#9a3412', 900: '#7c2d12' },
                        'light-blue': { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' }
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ÚJ: Képarány tartása mobilon */
        .carousel-container {
            position: relative;
            width: 100%;
            /* Alapértelmezett (mobil): 16/9-es arány */
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        /* Desktopon maradhat magasabb vagy teljes képernyős */
        @media (min-width: 768px) {
            .carousel-container {
                aspect-ratio: auto;
                height: 100vh;
            }
        }

        .carousel-slides {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .carousel-slide {
            min-width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        /* A többi korábbi stílus megtartása */
        .cookie-banner { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0, 0, 0, 0.95); color: white; padding: 1rem; z-index: 1000; transform: translateY(100%); transition: transform 0.3s ease-in-out; }
        .cookie-banner.show { transform: translateY(0); }
        .modal { display: none; position: fixed; z-index: 1001; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); }
        .modal-content { background-color: white; margin: 5% auto; padding: 2rem; border-radius: 8px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>

    </nav>

    <section id="home" class="relative">

                <div class="carousel-slide" style="background-image: url('assets/slide1.jpg')"></div>

                <div class="carousel-slide" style="background-image: url('assets/slide3.jpg')"></div>
                <div class="carousel-slide" style="background-image: url('assets/slide4.jpg')"></div>

            <div class="absolute inset-0 bg-gradient-to-r from-light-blue-500 to-orange-500 opacity-40"></div>

            <div class="absolute inset-0 z-10 flex items-center justify-center px-4">
                <div class="text-center w-full">
                    <h1 class="text-2xl md:text-6xl font-bold mb-4 text-white" style="text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);">
